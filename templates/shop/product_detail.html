{% extends "base.html" %}

{% block main %}
{% load thumbnail %}


<div class="container mt-5">

    <div class="row">

        <!-- IMAGE -->
        <div class="col-md-6 text-center">
            <div class="card shadow-sm p-3">
                <img src="{{ product.image.url }}"
                     class="img-fluid rounded"
                     alt="{{ product.title }}">
            </div>
        </div>

        <!-- INFO -->
        <div class="col-md-6">

            <h2 class="mb-3">{{ product.title }}</h2>

            <h3 class="text-primary mb-4">
                Uah {{ product.price }}
            </h3>

            <p class="text-muted">
                {{ product.description }}
            </p>

            <hr>

            <div class="d-flex align-items-center gap-3 mt-4">


                    <a class="btn btn-primary  btn-lg add-to-cart" href="{% url 'cart:cart_add' product_id=product.id %}">Add to cart</a>


                <a href="{% url 'shop:product_list' %}"
                   class="btn btn-outline-secondary">
                    ← Back to shop
                </a>

            </div>

        </div>

    </div>

</div>


{% endblock %}
